version: "3.9"

services:
  db:
    image: postgres:17
    container_name: codelegends-db
    restart: always
    environment:
      POSTGRES_DB: codelegends
      POSTGRES_USER: hisoka
      POSTGRES_PASSWORD: Hisoka@Moussa720
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: